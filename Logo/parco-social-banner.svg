<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="200" cy="150" r="80" fill="white" opacity="0.1"/>
  <circle cx="1000" cy="480" r="120" fill="white" opacity="0.08"/>
  <circle cx="1100" cy="100" r="60" fill="white" opacity="0.12"/>
  
  <!-- Main content card -->
  <rect x="100" y="100" width="1000" height="430" rx="20" fill="url(#cardGradient)" stroke="white" stroke-width="2" opacity="0.2"/>
  
  <!-- Parking icon -->
  <g transform="translate(600, 200)">
    <circle cx="0" cy="0" r="60" fill="white" opacity="0.9"/>
    <rect x="-30" y="-20" width="60" height="40" rx="8" fill="#2563eb"/>
    <rect x="-20" y="-10" width="40" height="20" rx="4" fill="white"/>
  </g>
  
  <!-- Main title -->
  <text x="600" y="320" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="64" font-weight="700">
    PARCO
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="380" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="32" font-weight="500" opacity="0.9">
    Visualización de Estacionamientos en México
  </text>
  
  <!-- Description -->
  <text x="600" y="420" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="24" font-weight="400" opacity="0.8">
    Más de 300 ubicaciones • Información detallada • Fotos y ubicaciones
  </text>
  
  <!-- Bottom accent -->
  <rect x="400" y="500" width="400" height="4" rx="2" fill="white" opacity="0.6"/>
</svg>
